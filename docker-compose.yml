services:
  llm-wiki:
    build: .
    ports:
      - "6006:6006"
    volumes:
      - llm-wiki-data:/var/lib/postgresql/data
      - ./data:/app/data
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=llm_wiki
      - DATABASE_URL=postgres://postgres:postgres@localhost:5432/llm_wiki?sslmode=disable
    restart: unless-stopped

volumes:
  llm-wiki-data:
