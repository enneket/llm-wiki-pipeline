<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Wiki</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LLM Wiki</h1>
            <nav>
                <button class="tab active" data-tab="query">查询</button>
                <button class="tab" data-tab="status">状态</button>
                <button class="tab" data-tab="feeds">Feed 管理</button>
                <button class="tab" data-tab="wiki">Wiki 浏览</button>
                <button class="tab" data-tab="documents">文档</button>
                <button class="tab" data-tab="settings">设置</button>
            </nav>
        </header>

        <main>
            <!-- Query Tab -->
            <section id="query" class="tab-content active">
                <div class="query-box">
                    <textarea id="question" placeholder="输入你的问题..." rows="4"></textarea>
                    <button id="ask-btn" onclick="askQuestion()">提问</button>
                </div>
                <div id="answer" class="answer-box" style="display:none">
                    <h3>答案</h3>
                    <div id="answer-content"></div>
                    <div id="sources" class="sources"></div>
                </div>
            </section>

            <!-- Status Tab -->
            <section id="status" class="tab-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-feeds">-</div>
                        <div class="stat-label">Feeds</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-docs">-</div>
                        <div class="stat-label">文档</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-wiki">-</div>
                        <div class="stat-label">Wiki 页面</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-pending">-</div>
                        <div class="stat-label">待处理</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-processing">-</div>
                        <div class="stat-label">处理中</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-done">-</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-failed">-</div>
                        <div class="stat-label">失败</div>
                    </div>
                </div>
                <div class="status-actions">
                    <button onclick="loadStatus()">刷新</button>
                    <button onclick="rebuildEmbeddings()" id="embed-btn">重建 Embeddings</button>
                    <button onclick="stopEmbeddings()" id="embed-stop-btn" style="display:none">停止</button>
                </div>
                <div id="embed-progress" class="fetch-progress" style="display:none">
                    <div class="progress-bar">
                        <div id="embed-progress-fill" class="progress-fill"></div>
                    </div>
                    <span id="embed-progress-text" class="progress-text">准备中...</span>
                </div>
            </section>

            <!-- Feeds Tab -->
            <section id="feeds" class="tab-content">
                <div class="feed-toolbar">
                    <div class="add-section">
                        <button onclick="showAddFeed()">添加 Feed</button>
                    </div>
                    <div class="import-section">
                        <input type="file" id="import-file" accept=".opml,.xml,.txt" style="display:none">
                        <button onclick="document.getElementById('import-file').click()">导入 OPML/URL</button>
                    </div>
                    <div class="export-section">
                        <button onclick="exportFeeds('json')">导出 JSON</button>
                        <button onclick="exportFeeds('opml')">导出 OPML</button>
                    </div>
                    <div class="fetch-section">
                        <button onclick="fetchFeeds()" id="fetch-btn" class="fetch-btn">立即拉取</button>
                    </div>
                </div>
                <div id="fetch-progress" class="fetch-progress" style="display:none">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <span id="progress-text" class="progress-text">准备中...</span>
                </div>
                <div id="feed-list" class="feed-list"></div>
                <div id="feed-pagination" class="doc-pagination"></div>
            </section>

            <!-- Wiki Tab -->
            <section id="wiki" class="tab-content">
                <div class="wiki-tabs">
                    <button class="wiki-tab active" data-wiki="entity">实体</button>
                    <button class="wiki-tab" data-wiki="concept">概念</button>
                    <button class="wiki-tab" data-wiki="source">来源</button>
                </div>
                <div class="wiki-filters">
                    <select id="wiki-filter-tag">
                        <option value="">全部分类</option>
                    </select>
                    <input id="wiki-search" placeholder="搜索..." type="text">
                </div>
                <div id="wiki-list" class="wiki-list"></div>
                <div id="wiki-pagination" class="doc-pagination"></div>
                <div id="wiki-content" class="wiki-content" style="display:none">
                    <button onclick="backToList()">返回列表</button>
                    <h2 id="wiki-title"></h2>
                    <div id="wiki-body"></div>
                </div>
            </section>

            <!-- Documents Tab -->
            <section id="documents" class="tab-content">
                <div class="doc-filters">
                    <select id="doc-filter-feed"><option value="">全部 Feed</option></select>
                    <select id="doc-filter-status">
                        <option value="">全部状态</option>
                        <option value="pending">⏳ 待处理</option>
                        <option value="processing">🔄 处理中</option>
                        <option value="done">✅ 已完成</option>
                        <option value="failed">❌ 失败</option>
                    </select>
                    <select id="doc-filter-source">
                        <option value="">全部来源</option>
                        <option value="raw">raw</option>
                        <option value="cleaned_raw">cleaned_raw</option>
                        <option value="reject">reject</option>
                    </select>
                    <input id="doc-filter-tag" placeholder="标签筛选">
                    <select id="doc-sort">
                        <option value="published:desc">最新优先</option>
                        <option value="published:asc">最早优先</option>
                        <option value="title:asc">标题 A-Z</option>
                        <option value="title:desc">标题 Z-A</option>
                    </select>
                </div>
                <div class="doc-header">
                    <span id="doc-total">共 0 篇文档</span>
                    <span id="doc-page-info">第 0/0 页</span>
                    <div class="doc-actions">
                        <button onclick="processDocuments()" id="process-btn" class="process-btn">LLM 处理</button>
                        <button onclick="stopProcessDocuments()" id="process-stop-btn" class="process-stop-btn" style="display:none">停止</button>
                    </div>
                </div>
                <div id="process-progress" class="fetch-progress" style="display:none">
                    <div class="progress-bar">
                        <div id="process-progress-fill" class="progress-fill"></div>
                    </div>
                    <span id="process-progress-text" class="progress-text">准备中...</span>
                </div>
                <div id="doc-list" class="doc-list"></div>
                <div id="doc-pagination" class="doc-pagination"></div>
                <div id="doc-content" class="doc-content" style="display:none">
                    <button onclick="backToDocList()">返回列表</button>
                    <h2 id="doc-title"></h2>
                    <div class="doc-meta">
                        <span id="doc-meta-feed"></span>
                        <span id="doc-meta-status"></span>
                        <span id="doc-meta-source"></span>
                        <span id="doc-meta-date"></span>
                    </div>
                    <div id="doc-body"></div>
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="settings" class="tab-content">
                <div class="settings-tabs">
                    <button class="settings-tab active" data-settings="llm">LLM 配置</button>
                    <button class="settings-tab" data-settings="filter">筛选配置</button>
                    <button class="settings-tab" data-settings="dedup">去重配置</button>
                    <button class="settings-tab" data-settings="general">通用配置</button>
                </div>

                <!-- LLM Settings -->
                <div id="settings-llm" class="settings-panel active">
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" id="llm-model" placeholder="gpt-4o">
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <div class="api-key-field">
                            <input type="password" id="llm-api-key" placeholder="sk-...">
                            <button class="toggle-visibility" onclick="toggleApiKey('llm-api-key')">显示</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Base URL</label>
                        <input type="text" id="llm-base-url" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="settings-actions">
                        <button onclick="saveSettings('llm')">保存</button>
                        <button onclick="testLLM()" class="test-btn">测试</button>
                    </div>
                    <div id="llm-test-result" class="test-result" style="display:none"></div>
                </div>

                <!-- Filter Settings -->
                <div id="settings-filter" class="settings-panel">
                    <div class="form-group">
                        <label>模式</label>
                        <select id="filter-mode">
                            <option value="keyword">关键词</option>
                            <option value="llm_judgment">LLM 判断</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>关键词标签</label>
                        <div class="tags-input-container" id="filter-tags-container">
                            <div class="tags-list" id="filter-tags-list"></div>
                            <input type="text" id="filter-keyword-tags-input" placeholder="输入标签后按回车添加" class="tags-text-input">
                        </div>
                        <input type="hidden" id="filter-keyword-tags">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="filter-keyword-match-any"> 匹配任意标签
                        </label>
                    </div>
                    <button onclick="saveSettings('filter')">保存</button>
                </div>

                <!-- Dedup Settings -->
                <div id="settings-dedup" class="settings-panel">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="dedup-url-exact"> URL 精确去重
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="dedup-content-hash"> 内容哈希去重
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="dedup-vector-enabled"> 向量去重
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="dedup-embedding-context"> Ingest 时使用 Embedding 搜索上下文
                        </label>
                        <p class="form-hint">关闭后使用数据库查询替代，节省 API 调用</p>
                    </div>
                    <div class="form-group">
                        <label>向量阈值 (0-1)</label>
                        <input type="number" id="dedup-vector-threshold" min="0" max="1" step="0.05" placeholder="0.85">
                    </div>
                    <div class="form-group">
                        <label>向量模型</label>
                        <input type="text" id="dedup-vector-model" placeholder="text-embedding-3-small">
                    </div>
                    <div class="form-group">
                        <label>向量 Base URL (可选)</label>
                        <input type="text" id="dedup-vector-url" placeholder="留空则使用 LLM Base URL">
                    </div>
                    <div class="form-group">
                        <label>向量 API Key (可选)</label>
                        <div class="api-key-field">
                            <input type="password" id="dedup-vector-key" placeholder="留空则使用 LLM API Key">
                            <button class="toggle-visibility" onclick="toggleApiKey('dedup-vector-key')">显示</button>
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button onclick="saveSettings('dedup')">保存</button>
                        <button onclick="testEmbedding()" class="test-btn">测试</button>
                    </div>
                    <div id="embedding-test-result" class="test-result" style="display:none"></div>
                </div>

                <!-- General Settings -->
                <div id="settings-general" class="settings-panel">
                    <div class="form-group">
                        <label>全局采集间隔 (Cron)</label>
                        <input type="text" id="general-interval" placeholder="0 */6 * * *">
                    </div>
                    <button onclick="saveSettings('general')">保存</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Feed Add Dialog -->
    <div id="feed-add-dialog" class="dialog-overlay" style="display:none">
        <div class="dialog">
            <h3>添加 Feed</h3>
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="feed-add-name" placeholder="Feed 名称">
            </div>
            <div class="form-group">
                <label>URL</label>
                <input type="text" id="feed-add-url" placeholder="Feed URL">
            </div>
            <div class="form-group">
                <label>标签 (逗号分隔)</label>
                <input type="text" id="feed-add-tags" placeholder="AI,LLM,Rust">
            </div>
            <div class="dialog-actions">
                <button onclick="saveAddFeed()">添加</button>
                <button onclick="cancelAddFeed()" class="cancel-btn">取消</button>
            </div>
        </div>
    </div>

    <!-- Feed Edit Dialog -->
    <div id="feed-edit-dialog" class="dialog-overlay" style="display:none">
        <div class="dialog">
            <h3>编辑 Feed</h3>
            <input type="hidden" id="feed-edit-id">
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="feed-edit-name" placeholder="Feed 名称">
            </div>
            <div class="form-group">
                <label>URL</label>
                <input type="text" id="feed-edit-url" placeholder="Feed URL">
            </div>
            <div class="form-group">
                <label>标签 (逗号分隔)</label>
                <input type="text" id="feed-edit-tags" placeholder="AI,LLM,Rust">
            </div>
            <div class="dialog-actions">
                <button onclick="saveEditFeed()">保存</button>
                <button onclick="cancelEditFeed()" class="cancel-btn">取消</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
